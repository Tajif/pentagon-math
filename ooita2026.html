<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>正六角形さいころ移動シミュレーター</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0ece3;--card:#fffdf8;--text:#2c2520;--muted:#8a8078;
  --red:#e24b4a;--blue:#378add;--green:#1d9e75;--amber:#ef9f27;
  --purple:#7f77dd;--teal:#0f6e56;
  --piece:#3d3530;
  --shadow:0 4px 24px rgba(44,37,32,.10);
}
body{
  font-family:'Noto Sans JP','M PLUS Rounded 1c',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:20px 12px;
}
h1{
  font-family:'M PLUS Rounded 1c',sans-serif;font-weight:900;
  font-size:clamp(18px,3.5vw,26px);text-align:center;margin-bottom:2px;
}
.subtitle{font-size:12px;color:var(--muted);text-align:center;margin-bottom:16px}
.main-layout{
  display:flex;flex-wrap:wrap;gap:20px;justify-content:center;
  max-width:1100px;width:100%;
}
.hex-panel{
  background:var(--card);border-radius:18px;padding:20px;
  box-shadow:var(--shadow);min-width:320px;max-width:420px;flex:0 1 420px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.speed-row{
  display:flex;align-items:center;gap:6px;justify-content:center;
  font-size:11px;color:var(--muted);width:100%;
  padding-bottom:4px;border-bottom:1px solid #e8e2d8;margin-bottom:4px;
}
.speed-row input{width:100px}
svg.hex-svg{width:100%;max-width:380px}
.hex-edge{stroke:var(--text);stroke-width:2.5;fill:none;stroke-linejoin:round}
.vertex-circle{fill:#fff;stroke:var(--text);stroke-width:2;transition:all .25s}
.vertex-label{
  font-family:'M PLUS Rounded 1c',sans-serif;font-weight:700;font-size:17px;
  fill:var(--text);text-anchor:middle;dominant-baseline:central;pointer-events:none;
}
.vertex-sublabel{font-size:10px;fill:var(--muted);text-anchor:middle;font-weight:400}
.ccw-text{font-size:10px;fill:var(--blue);opacity:.5;font-family:'Noto Sans JP',sans-serif}
.marker-label{
  font-family:'M PLUS Rounded 1c',sans-serif;font-weight:900;font-size:14px;
  text-anchor:middle;dominant-baseline:central;pointer-events:none;
}
.dice-display{
  font-family:'M PLUS Rounded 1c',sans-serif;
  fill:var(--text);text-anchor:middle;
}
.dice-num{font-weight:900;font-size:26px}
.dice-lbl{font-weight:400;font-size:15px;fill:var(--muted)}
.piece{filter:drop-shadow(0 2px 5px rgba(0,0,0,.25))}
.info-bar{
  width:100%;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;
}
.pos-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 12px;border-radius:8px;font-weight:700;font-size:13px;color:#fff;
}
.badge-a{background:var(--red)}.badge-p{background:var(--blue)}.badge-q{background:var(--green)}
.msg-box{
  width:100%;text-align:center;font-size:12px;color:var(--muted);line-height:1.6;
  min-height:36px;padding:4px 8px;
}
.msg-box strong{color:var(--text)}
.hl{display:inline-block;padding:1px 6px;border-radius:4px;font-weight:700}
.hl-b{background:#e6f1fb;color:var(--blue)}
.hl-g{background:#e1f5ee;color:var(--green)}
.table-panel{
  background:var(--card);border-radius:18px;padding:20px;
  box-shadow:var(--shadow);min-width:320px;max-width:520px;flex:1 1 480px;
  display:flex;flex-direction:column;gap:12px;
}
.table-title{
  font-family:'M PLUS Rounded 1c',sans-serif;font-weight:700;font-size:15px;
  text-align:center;
}
.table-wrap{overflow-x:auto}
table.grid{border-collapse:collapse;width:100%;table-layout:fixed}
table.grid th,table.grid td{
  border:1px solid #d9d2c7;text-align:center;vertical-align:middle;
  font-size:12px;padding:0;height:52px;
}
table.grid th{background:#eae5db;font-weight:700;font-size:13px;height:36px}
table.grid th.corner{background:#ddd7cc;font-size:10px;line-height:1.3}
table.grid th.row-hdr{background:#eae5db;width:52px}
table.grid td.empty{cursor:pointer;background:#fffdf8;transition:background .15s}
table.grid td.empty:hover{background:#f5f0e5}
table.grid td.filled{cursor:pointer;font-size:11px;line-height:1.4;font-weight:500}
table.grid td.active-cell{
  outline:3px solid var(--blue);outline-offset:-2px;
  background:#e6f1fb !important;
}
table.grid td.c-same{background:#fde8e8}
table.grid td.c-diff{background:#dbeeff}
table.grid td.c-ap{background:#f3e8fd}
table.grid td.c-aq{background:#faeeda}
table.grid td.c-pq{background:#e1f5ee}
.p-line{color:var(--blue);font-weight:700}
.q-line{color:var(--green);font-weight:700}
.legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;font-size:11px;color:var(--muted)}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-box{width:14px;height:14px;border-radius:3px;border:1px solid #ccc}
.counter-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.counter-chip{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500;background:#f0ece3;color:var(--muted)}
.counter-chip strong{color:var(--text)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.btn{
  font-family:'M PLUS Rounded 1c',sans-serif;font-weight:700;font-size:12px;
  padding:8px 16px;border-radius:10px;border:none;cursor:pointer;transition:all .12s;
}
.btn:active{transform:scale(.96)}
.btn-reset{background:#e8e2d8;color:var(--text)}
.btn-reset:hover{background:#ddd6ca}
.btn-all{background:var(--text);color:#fff}
.btn-all:hover{background:#3d3530}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
</style>
</head>
<body>

<h1>正六角形 さいころ移動シミュレーター</h1>
<p class="subtitle">6×6の表のマスをクリックすると、対応するコマの移動がアニメーションで表示されます</p>

<div class="main-layout">

<div class="hex-panel">
  <div class="speed-row">
    <span>🐢 遅い</span>
    <input type="range" min="0.5" max="4" step="0.25" value="1.5" id="speedSlider" oninput="updateSpeed()">
    <span>速い 🐇</span>
    <span id="speedLabel" style="min-width:32px;text-align:right;font-weight:500">×1.5</span>
  </div>
  <svg class="hex-svg" viewBox="-10 -30 320 360" id="hexSvg">
    <defs>
      <marker id="arrowB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
        <path d="M2 2L8 5L2 8" fill="none" stroke="#378add" stroke-width="1.5" stroke-linecap="round"/>
      </marker>
    </defs>
    <path d="M168,52 A82,82 0 0 0 105,58" fill="none" stroke="#378add" stroke-width="1.2" stroke-dasharray="4 3" opacity=".4" marker-end="url(#arrowB)"/>
    <text x="152" y="38" class="ccw-text" text-anchor="middle">反時計回り ↺</text>
    <!-- さいころの目（六角形の中央に大きく表示） -->
    <g id="diceGroup" opacity="0">
      <text class="dice-display" x="150" y="150">
        <tspan class="dice-lbl">1回目: </tspan><tspan class="dice-num" id="d1Val"></tspan>
      </text>
      <text class="dice-display" x="150" y="178">
        <tspan class="dice-lbl">2回目: </tspan><tspan class="dice-num" id="d2Val"></tspan>
      </text>
    </g>
    <polygon id="hexPoly" class="hex-edge" points=""/>
    <g id="diagonals" opacity=".06"></g>
    <g id="pathGroup"></g>
    <g id="vertexGroup"></g>
    <g id="markerGroup"></g>
    <g id="pieceGroup"></g>
  </svg>
  <div class="info-bar" id="infoBar">
    <span class="pos-badge badge-a">A = スタート</span>
  </div>
  <div class="msg-box" id="msgBox">← 右の表のマスをクリックしてください</div>
</div>

<div class="table-panel">
  <div class="table-title">さいころの目の組み合わせ（全36通り）</div>
  <div class="table-wrap">
    <table class="grid" id="gridTable">
      <thead>
        <tr>
          <th class="corner" rowspan="2" style="width:52px">1回目↓<br>2回目→</th>
          <th colspan="6" style="height:24px;font-size:11px;color:var(--blue)">2回目の目</th>
        </tr>
        <tr id="colHeaders"></tr>
      </thead>
      <tbody id="gridBody"></tbody>
    </table>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-box" style="background:#dbeeff"></div>すべて異なる</div>
    <div class="legend-item"><div class="legend-box" style="background:#f3e8fd"></div>A=P</div>
    <div class="legend-item"><div class="legend-box" style="background:#faeeda"></div>A=Q</div>
    <div class="legend-item"><div class="legend-box" style="background:#e1f5ee"></div>P=Q</div>
    <div class="legend-item"><div class="legend-box" style="background:#fde8e8"></div>すべて一致</div>
  </div>
  <div class="counter-row">
    <div class="counter-chip">クリック済: <strong id="cntTotal">0</strong> / 36</div>
  </div>
  <div class="btn-row">
    <button class="btn btn-all" id="btnAll" onclick="fillAll()">全マスを一括表示</button>
    <button class="btn btn-reset" onclick="resetAll()">↺ リセット</button>
  </div>
</div>

</div>

<script>
const CX=150,CY=160,R=115;
const LABELS=['A','B','C','D','E','F'];
let speed=1.5,animating=false,clickedCount=0;
let cellState=Array.from({length:6},()=>Array(6).fill(false));

const V=[];
for(let i=0;i<6;i++){
  const a=-Math.PI/2-(Math.PI*2*i/6);
  V.push({x:CX+R*Math.cos(a),y:CY+R*Math.sin(a),label:LABELS[i]});
}
function calcPQ(d1,d2){const pIdx=d1%6,qIdx=(d1+d2)%6;return{pIdx,qIdx,pL:LABELS[pIdx],qL:LABELS[qIdx]};}
function classify(pi,qi){
  const ap=(pi===0), aq=(qi===0), pq=(pi===qi);
  if(ap&&pq) return'same';   // A=P=Q
  if(ap) return'ap';          // A=P only
  if(aq) return'aq';          // A=Q only
  if(pq) return'pq';          // P=Q only
  return'diff';                // all different
}
function makeSVG(tag,attrs){const el=document.createElementNS('http://www.w3.org/2000/svg',tag);if(attrs)Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));return el;}

// ===== さいころの目テキスト =====
function showDiceText(d1,d2){
  document.getElementById('d1Val').textContent=d1;
  document.getElementById('d2Val').textContent=d2;
  document.getElementById('diceGroup').setAttribute('opacity','1');
}
function clearDiceText(){
  document.getElementById('diceGroup').setAttribute('opacity','0');
}

// ===== 六角形 =====
function initHex(){
  document.getElementById('hexPoly').setAttribute('points',V.map(v=>`${v.x},${v.y}`).join(' '));
  const dg=document.getElementById('diagonals');dg.innerHTML='';
  for(let i=0;i<3;i++) dg.appendChild(makeSVG('line',{x1:V[i].x,y1:V[i].y,x2:V[i+3].x,y2:V[i+3].y,stroke:'#2c2520','stroke-width':'1'}));
  drawVertices();placePieceAt(0);placeMarkerA();
}
function drawVertices(){
  const vg=document.getElementById('vertexGroup');vg.innerHTML='';
  V.forEach((v,i)=>{
    const g=makeSVG('g');
    g.appendChild(makeSVG('circle',{cx:v.x,cy:v.y,r:17,class:'vertex-circle',id:`vc${i}`}));
    const t=makeSVG('text',{x:v.x,y:v.y,class:'vertex-label'});t.textContent=v.label;g.appendChild(t);
    const offy=v.y<CY?-26:28,offx=v.x<CX-10?-8:(v.x>CX+10?8:0);
    const st=makeSVG('text',{x:v.x+offx,y:v.y+offy,class:'vertex-sublabel','font-family':"'Noto Sans JP',sans-serif"});
    st.textContent=i===0?'スタート':`${i}歩`;g.appendChild(st);
    vg.appendChild(g);
  });
}

// ===== マーカー =====
function clearMarkers(){document.getElementById('markerGroup').innerHTML='';}
function placeMarkerA(){addMarkerAt(0,'A','#e24b4a');}

function addMarkerAt(vIdx,label,color){
  const v=V[vIdx];
  const angle=Math.atan2(v.y-CY,v.x-CX);
  const dist=28;
  const mx=v.x+Math.cos(angle)*dist, my=v.y+Math.sin(angle)*dist;
  drawMarker(vIdx,label,color,mx,my);
}

function drawMarker(vIdx,label,color,mx,my){
  const mg=document.getElementById('markerGroup');
  const v=V[vIdx];
  const g=makeSVG('g');
  g.appendChild(makeSVG('line',{x1:mx,y1:my,x2:v.x,y2:v.y,stroke:color,'stroke-width':'1.5',opacity:'0.4','stroke-dasharray':'3 2'}));
  g.appendChild(makeSVG('circle',{cx:mx,cy:my,r:12,fill:color,opacity:'0.95'}));
  const t=makeSVG('text',{x:mx,y:my,class:'marker-label',fill:'#fff'});t.textContent=label;
  g.appendChild(t);
  mg.appendChild(g);
}

function placeAllMarkers(pIdx,qIdx){
  clearMarkers();
  const groups={};
  [{idx:0,label:'A',color:'#e24b4a',ord:0},{idx:pIdx,label:'P',color:'#378add',ord:1},{idx:qIdx,label:'Q',color:'#1d9e75',ord:2}]
    .forEach(m=>{if(!groups[m.idx])groups[m.idx]=[];groups[m.idx].push(m);});

  Object.entries(groups).forEach(([vi,items])=>{
    const vIdx=parseInt(vi),v=V[vIdx];
    const angle=Math.atan2(v.y-CY,v.x-CX);
    const dist=28;
    const baseMx=v.x+Math.cos(angle)*dist, baseMy=v.y+Math.sin(angle)*dist;
    if(items.length===1){
      drawMarker(vIdx,items[0].label,items[0].color,baseMx,baseMy);
    } else {
      const tangent=angle+Math.PI/2;
      const spacing=22,startOff=-(items.length-1)*spacing/2;
      items.sort((a,b)=>a.ord-b.ord);
      items.forEach((item,i)=>{
        const off=startOff+i*spacing;
        drawMarker(vIdx,item.label,item.color,baseMx+Math.cos(tangent)*off,baseMy+Math.sin(tangent)*off);
      });
    }
  });
}

function placePairMarkers(pIdx){
  clearMarkers();
  const groups={};
  [{idx:0,label:'A',color:'#e24b4a',ord:0},{idx:pIdx,label:'P',color:'#378add',ord:1}]
    .forEach(m=>{if(!groups[m.idx])groups[m.idx]=[];groups[m.idx].push(m);});
  Object.entries(groups).forEach(([vi,items])=>{
    const vIdx=parseInt(vi),v=V[vIdx];
    const angle=Math.atan2(v.y-CY,v.x-CX);
    const dist=28;
    const baseMx=v.x+Math.cos(angle)*dist,baseMy=v.y+Math.sin(angle)*dist;
    if(items.length===1){drawMarker(vIdx,items[0].label,items[0].color,baseMx,baseMy);}
    else{
      const tangent=angle+Math.PI/2,spacing=22,startOff=-(items.length-1)*spacing/2;
      items.sort((a,b)=>a.ord-b.ord);
      items.forEach((item,i)=>{
        const off=startOff+i*spacing;
        drawMarker(vIdx,item.label,item.color,baseMx+Math.cos(tangent)*off,baseMy+Math.sin(tangent)*off);
      });
    }
  });
}

// ===== コマ =====
function placePieceAt(idx){
  const pg=document.getElementById('pieceGroup');pg.innerHTML='';
  const v=V[idx];
  const g=makeSVG('g',{class:'piece',id:'piece'});
  g.appendChild(makeSVG('ellipse',{cx:v.x,cy:v.y+2,rx:12,ry:5,fill:'rgba(0,0,0,.12)',id:'pSh'}));
  g.appendChild(makeSVG('circle',{cx:v.x,cy:v.y-5,r:10,fill:'var(--piece)',stroke:'#fff','stroke-width':'2',id:'pC'}));
  const t=makeSVG('text',{x:v.x,y:v.y-5,'text-anchor':'middle','dominant-baseline':'central',fill:'#fff','font-size':'9','font-weight':'700','font-family':"'M PLUS Rounded 1c',sans-serif",id:'pT'});
  t.textContent='コマ';g.appendChild(t);
  pg.appendChild(g);
}
function slidePieceTo(idx,dur,cb){
  const v=V[idx],ms=dur+'ms',ease='cubic-bezier(.34,1.4,.64,1)';
  ['pC','pSh','pT'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.transition=`all ${ms} ${ease}`;});
  document.getElementById('pC').setAttribute('cx',v.x);document.getElementById('pC').setAttribute('cy',v.y-5);
  document.getElementById('pSh').setAttribute('cx',v.x);document.getElementById('pSh').setAttribute('cy',v.y+2);
  document.getElementById('pT').setAttribute('x',v.x);document.getElementById('pT').setAttribute('y',v.y-5);
  setTimeout(cb,dur+30);
}

function drawEdge(from,to,color){
  document.getElementById('pathGroup').appendChild(
    makeSVG('line',{x1:V[from].x,y1:V[from].y,x2:V[to].x,y2:V[to].y,
      stroke:color,'stroke-width':'3','stroke-linecap':'round',opacity:'0.5','stroke-dasharray':'6 4'}));
}
function hlV(idx,color){
  const c=document.getElementById(`vc${idx}`);
  c.style.fill=color;c.style.fillOpacity='.15';c.style.stroke=color;c.style.strokeWidth='3';
}
function resetVStyles(){
  for(let i=0;i<6;i++){const c=document.getElementById(`vc${i}`);c.style.fill='#fff';c.style.fillOpacity='1';c.style.stroke='#2c2520';c.style.strokeWidth='2';}
  document.getElementById('pathGroup').innerHTML='';
}

function walkSteps(fromIdx,steps,color,cb){
  let cur=fromIdx,step=0;
  const dur=Math.max(100,320/speed),gap=Math.max(50,130/speed);
  function tick(){
    if(step>=steps){cb(cur);return;}
    const next=(cur+1)%6;
    drawEdge(cur,next,color);hlV(next,color);
    cur=next;
    slidePieceTo(cur,dur,()=>{step++;setTimeout(tick,gap);});
  }
  tick();
}

// ===== メイン =====
function runAnimation(d1,d2,cb){
  animating=true;
  const{pIdx,qIdx,pL,qL}=calcPQ(d1,d2);

  resetVStyles();
  document.getElementById('pathGroup').innerHTML='';
  clearMarkers();placePieceAt(0);
  hlV(0,'#e24b4a');
  addMarkerAt(0,'A','#e24b4a');

  // さいころの目を六角形の中央に表示
  showDiceText(d1,d2);

  const ib=document.getElementById('infoBar');
  const mb=document.getElementById('msgBox');
  ib.innerHTML='<span class="pos-badge badge-a">A = スタート</span>';
  mb.innerHTML=`<strong>［規則１］</strong> 目 <span class="hl hl-b">${d1}</span> → Aから${d1}歩 反時計回りに移動…`;

  const startDelay=Math.max(200,450/speed);
  setTimeout(()=>{
    walkSteps(0,d1,'#378add',()=>{
      // Pマーカー
      placePairMarkers(pIdx);

      ib.innerHTML=`<span class="pos-badge badge-a">A</span>`
        +`<span style="color:var(--muted);font-size:13px">,</span>`
        +`<span class="pos-badge badge-p">P = ${pL}</span>`;
      mb.innerHTML=`P = <span class="hl hl-b">${pL}</span> に到着！ → <strong>［規則２］</strong> 目 <span class="hl hl-g">${d2}</span> → Pから${d2}歩…`;

      const midDelay=Math.max(180,400/speed);
      setTimeout(()=>{
        walkSteps(pIdx,d2,'#1d9e75',()=>{
          hlV(qIdx,'#1d9e75');
          // A,P,Q 全マーカー
          placeAllMarkers(pIdx,qIdx);

          ib.innerHTML=`<span class="pos-badge badge-a">A</span>`
            +`<span style="color:var(--muted);font-size:13px">,</span>`
            +`<span class="pos-badge badge-p">P = ${pL}</span>`
            +`<span style="color:var(--muted);font-size:13px">,</span>`
            +`<span class="pos-badge badge-q">Q = ${qL}</span>`;
          mb.innerHTML=`Q = <span class="hl hl-g">${qL}</span> に到着！`;
          animating=false;
          if(cb)cb(classify(pIdx,qIdx));
        });
      },midDelay);
    });
  },startDelay);
}

// ===== 表 =====
function buildTable(){
  const chr=document.getElementById('colHeaders');chr.innerHTML='';
  for(let j=1;j<=6;j++){const th=document.createElement('th');th.textContent=j;th.style.width='60px';chr.appendChild(th);}
  const body=document.getElementById('gridBody');body.innerHTML='';
  for(let i=0;i<6;i++){
    const tr=document.createElement('tr');
    const th=document.createElement('th');th.className='row-hdr';
    th.innerHTML=`${i+1}<br><span style="font-size:10px;color:var(--blue);font-weight:400">P=${LABELS[(i+1)%6]}</span>`;
    tr.appendChild(th);
    for(let j=0;j<6;j++){
      const td=document.createElement('td');td.className='empty';td.id=`cell-${i}-${j}`;
      td.onclick=()=>cellClick(i,j);tr.appendChild(td);
    }
    body.appendChild(tr);
  }
}
function cellClick(i,j){
  if(animating)return;
  document.querySelectorAll('td.active-cell').forEach(c=>c.classList.remove('active-cell'));
  document.getElementById(`cell-${i}-${j}`).classList.add('active-cell');
  if(cellState[i][j]){
    runAnimation(i+1,j+1,()=>{document.getElementById(`cell-${i}-${j}`).classList.remove('active-cell');});
    return;
  }
  runAnimation(i+1,j+1,(cat)=>{
    fillCell(i,j,cat);
    document.getElementById(`cell-${i}-${j}`).classList.remove('active-cell');
  });
}
function fillCell(i,j,cat){
  if(cellState[i][j])return;
  cellState[i][j]=true;
  const{pL,qL}=calcPQ(i+1,j+1);
  const td=document.getElementById(`cell-${i}-${j}`);
  td.className='filled';
  if(cat==='same')td.classList.add('c-same');
  else if(cat==='diff')td.classList.add('c-diff');
  else if(cat==='ap')td.classList.add('c-ap');
  else if(cat==='aq')td.classList.add('c-aq');
  else td.classList.add('c-pq');
  td.innerHTML=`<span class="p-line">P=${pL}</span><br><span class="q-line">Q=${qL}</span>`;
  td.onclick=()=>cellClick(i,j);td.style.cursor='pointer';
  clickedCount++;document.getElementById('cntTotal').textContent=clickedCount;
}
function fillAll(){
  if(animating)return;
  for(let i=0;i<6;i++)for(let j=0;j<6;j++){
    if(!cellState[i][j]){const{pIdx,qIdx}=calcPQ(i+1,j+1);fillCell(i,j,classify(pIdx,qIdx));}
  }
  resetVStyles();hlV(0,'#e24b4a');placePieceAt(0);
  clearMarkers();placeMarkerA();clearDiceText();
  document.getElementById('pathGroup').innerHTML='';
  document.getElementById('infoBar').innerHTML='<span class="pos-badge badge-a">A = スタート</span>';
  document.getElementById('msgBox').innerHTML='全36マスを表示しました。マスをクリックするとアニメーションを再生できます。';
}
function resetAll(){
  if(animating)return;
  cellState=Array.from({length:6},()=>Array(6).fill(false));
  clickedCount=0;document.getElementById('cntTotal').textContent='0';
  buildTable();resetVStyles();hlV(0,'#e24b4a');placePieceAt(0);
  clearMarkers();placeMarkerA();clearDiceText();
  document.getElementById('pathGroup').innerHTML='';
  document.getElementById('infoBar').innerHTML='<span class="pos-badge badge-a">A = スタート</span>';
  document.getElementById('msgBox').innerHTML='← 表のマスをクリックしてください';
}
function updateSpeed(){speed=parseFloat(document.getElementById('speedSlider').value);document.getElementById('speedLabel').textContent=`×${speed}`;}

initHex();buildTable();hlV(0,'#e24b4a');
</script>
</body>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コマひっくり返しシミュレーター</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif; color: #1a1a1a; line-height: 1.7; padding: 1rem; background: #fff; }
.title { font-size: 16px; font-weight: 500; margin-bottom: 12px; }
.coins { display: flex; gap: 6px; justify-content: center; margin: 8px 0; }
.coin { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; border: 2px solid #888; transition: box-shadow 0.2s; }
.coin.white { background: #fff; color: #666; }
.coin.black { background: #2C2C2A; color: #fff; }
.coin.hl-1 { box-shadow: 0 0 0 2.5px #E24B4A; }
.coin.hl-2 { box-shadow: 0 0 0 2.5px #378ADD; }
.coin.hl-both { box-shadow: 0 0 0 2.5px #9B59B6; }
.coin.flipping { animation: flipSquish 0.4s ease-in-out; }
@keyframes flipSquish {
  0%   { transform: scaleX(1) scaleY(1); }
  45%  { transform: scaleX(0.05) scaleY(1.1); }
  55%  { transform: scaleX(0.05) scaleY(1.1); }
  100% { transform: scaleX(1) scaleY(1); }
}
.controls { display: flex; align-items: center; gap: 12px; margin: 12px 0; flex-wrap: wrap; }
.controls label { font-size: 13px; color: #666; white-space: nowrap; }
.controls select { font-size: 14px; padding: 4px 8px; border-radius: 8px; border: 1px solid #ccc; background: #fff; color: #1a1a1a; }
.btn-run { padding: 6px 18px; border-radius: 8px; border: 1px solid #378ADD; background: #E6F1FB; color: #0C447C; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.btn-run:hover { background: #B5D4F4; }
.btn-run:active { transform: scale(0.97); }
.btn-run:disabled { opacity: 0.4; cursor: default; transform: none; }
.stage { margin: 16px 0; }
.stage-label { font-size: 12px; color: #999; text-align: center; margin-bottom: 2px; }
.stage-name { font-size: 13px; font-weight: 500; text-align: center; margin-bottom: 4px; min-height: 20px; }
.stage-name .op1 { color: #E24B4A; }
.stage-name .op2 { color: #378ADD; }
.arrow { text-align: center; font-size: 18px; color: #ccc; margin: 4px 0; }
.result { background: #f5f5f3; border-radius: 8px; padding: 10px 16px; margin-top: 16px; font-size: 14px; text-align: center; min-height: 44px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.result .count { font-weight: 500; }
.overlap-note { display: block; font-size: 12px; color: #BA7517; margin-top: 4px; }
.legend { display: flex; gap: 14px; justify-content: center; margin-top: 12px; font-size: 11px; color: #999; flex-wrap: wrap; }
.legend span { display: flex; align-items: center; gap: 4px; }
.legend .dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid; }
.num-labels { display: flex; gap: 6px; justify-content: center; margin-bottom: 2px; }
.num-label { width: 42px; text-align: center; font-size: 11px; color: #bbb; }
</style>
</head>
<body>

<div class="title">コマひっくり返しシミュレーター</div>

<div class="controls">
  <label>操作1の目（左から）</label>
  <select id="op1">
    <option value="1">1</option><option value="2">2</option><option value="3">3</option>
    <option value="4" selected>4</option><option value="5">5</option><option value="6">6</option>
  </select>
  <label>操作2の目（右から）</label>
  <select id="op2">
    <option value="1">1</option><option value="2">2</option>
    <option value="3" selected>3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option>
  </select>
  <button class="btn-run" id="btn-run" onclick="runAnimation()">実行</button>
</div>

<div class="stage">
  <div class="stage-label">最初の状態（すべて白）</div>
  <div class="num-labels" id="nums"></div>
  <div class="coins" id="coins-start"></div>
</div>

<div class="arrow">↓</div>

<div class="stage">
  <div class="stage-name" id="label-mid">&nbsp;</div>
  <div class="coins" id="coins-mid"></div>
</div>

<div class="arrow">↓</div>

<div class="stage">
  <div class="stage-name" id="label-end">&nbsp;</div>
  <div class="coins" id="coins-end"></div>
</div>

<div class="result" id="result">
  <span style="color:#999;">目を選んで「実行」を押してください</span>
</div>

<div class="legend">
  <span><span class="dot" style="border-color:#E24B4A; background:transparent;"></span>操作1で反転</span>
  <span><span class="dot" style="border-color:#378ADD; background:transparent;"></span>操作2で反転</span>
  <span><span class="dot" style="border-color:#9B59B6; background:transparent;"></span>両方で反転（白に戻る）</span>
</div>

<script>
var FLIP_DUR = 400;
var GAP = 220;
var animating = false;

function makeCoin(isBlack) {
  var div = document.createElement('div');
  div.className = 'coin ' + (isBlack ? 'black' : 'white');
  div.textContent = isBlack ? '黒' : '白';
  return div;
}

function createRow(containerId, blackSet) {
  var el = document.getElementById(containerId);
  el.innerHTML = '';
  for (var i = 0; i < 6; i++) {
    var isBlack = blackSet && blackSet.has(i);
    el.appendChild(makeCoin(isBlack));
  }
}

function renderNums() {
  var el = document.getElementById('nums');
  el.innerHTML = '';
  for (var i = 0; i < 6; i++) {
    var d = document.createElement('div');
    d.className = 'num-label';
    d.textContent = (i + 1) + '番';
    el.appendChild(d);
  }
}

function flipOneCoin(containerId, index, hlClass) {
  return new Promise(function(resolve) {
    var row = document.getElementById(containerId);
    var coin = row.children[index];
    if (!coin) { resolve(); return; }

    var wasBlack = coin.classList.contains('black');

    coin.classList.add('flipping');
    if (hlClass) coin.classList.add(hlClass);

    setTimeout(function() {
      if (wasBlack) {
        coin.classList.remove('black');
        coin.classList.add('white');
        coin.textContent = '白';
      } else {
        coin.classList.remove('white');
        coin.classList.add('black');
        coin.textContent = '黒';
      }
    }, FLIP_DUR * 0.48);

    setTimeout(function() {
      coin.classList.remove('flipping');
      resolve();
    }, FLIP_DUR + 30);
  });
}

function sleep(ms) {
  return new Promise(function(r) { setTimeout(r, ms); });
}

async function runAnimation() {
  if (animating) return;
  animating = true;
  document.getElementById('btn-run').disabled = true;

  var a = parseInt(document.getElementById('op1').value);
  var b = parseInt(document.getElementById('op2').value);

  document.getElementById('label-mid').innerHTML = '&nbsp;';
  document.getElementById('label-end').innerHTML = '&nbsp;';
  document.getElementById('result').innerHTML = '';

  createRow('coins-start', null);
  createRow('coins-mid', null);
  createRow('coins-end', null);

  await sleep(350);

  document.getElementById('label-mid').innerHTML =
    '<span class="op1">操作1：左から' + a + '枚をひっくり返す</span>';

  for (var i = 0; i < a; i++) {
    await flipOneCoin('coins-mid', i, 'hl-1');
    if (i < a - 1) await sleep(GAP);
  }

  await sleep(600);

  var midBlack = new Set();
  for (var i = 0; i < a; i++) midBlack.add(i);
  createRow('coins-end', midBlack);

  document.getElementById('label-end').innerHTML =
    '<span class="op2">操作2：右から' + b + '枚をひっくり返す</span>';

  await sleep(300);

  for (var j = 0; j < b; j++) {
    var idx = 5 - j;
    var isBoth = midBlack.has(idx);
    await flipOneCoin('coins-end', idx, isBoth ? 'hl-both' : 'hl-2');
    if (j < b - 1) await sleep(GAP);
  }

  await sleep(300);

  var final = [0,0,0,0,0,0];
  for (var i = 0; i < a; i++) final[i] = 1;
  for (var i = 0; i < b; i++) {
    var idx = 5 - i;
    final[idx] = final[idx] === 0 ? 1 : 0;
  }
  var w = final.filter(function(c) { return c === 0; }).length;
  var bk = 6 - w;
  var overlap = a + b > 6 ? a + b - 6 : 0;

  var html = '白 <span class="count">' + w + '枚</span>、黒 <span class="count">' + bk + '枚</span>';
  if (overlap > 0) {
    html += '<span class="overlap-note">※ ' + overlap +
      '枚が操作1と操作2の両方でひっくり返されて白に戻りました（紫の枠）</span>';
  }
  document.getElementById('result').innerHTML = html;

  animating = false;
  document.getElementById('btn-run').disabled = false;
}

renderNums();
createRow('coins-start', null);
createRow('coins-mid', null);
createRow('coins-end', null);
</script>
</body>
</html>

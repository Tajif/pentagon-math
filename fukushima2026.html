<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>確率樹形図シミュレーター</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f8f9fa; color: #333; padding: 20px; }
        .container { display: flex; flex-direction: column; align-items: center; }
        .box-row { display: flex; gap: 30px; margin-bottom: 20px; }
        .box { border: 2px solid #555; border-radius: 8px; padding: 10px; width: 140px; background: #fff; text-align: center; }
        .ball { width: 30px; height: 30px; border-radius: 50%; display: inline-block; margin: 5px; border: 2px solid #ccc; transition: all 0.3s; }
        .red { background-color: #ff4d4d; } .white { background-color: #ffffff; } .black { background-color: #333333; }
        .picked { opacity: 0.1; filter: grayscale(100%); }
        
        button { padding: 12px 24px; font-size: 1.1em; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; margin-bottom: 20px; }
        button:hover { background: #218838; }

        .tree-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            width: 100%; 
            max-width: 900px; 
            font-size: 0.8em;
            background: white;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }
        .path { padding: 4px; border-bottom: 1px solid #eee; transition: background 0.5s; }
        .highlight { background-color: #fff3cd !important; font-weight: bold; color: #856404; border: 2px solid #ffeeba; }
        .condition1 { color: #d9534f; } /* ①の条件用 */
    </style>
</head>
<body>
    <div class="container">
        <h2>3つの箱の確率シミュレーター</h2>
        <div class="box-row">
            <div class="box">箱Ａ<br><div id="a-r1" class="ball red"></div><div id="a-r2" class="ball red"></div><div id="a-w" class="ball white"></div><br><small>赤1, 赤2, 白</small></div>
            <div class="box">箱Ｂ<br><div id="b-r" class="ball red"></div><div id="b-k" class="ball black"></div><div id="b-w" class="ball white"></div><br><small>赤, 黒, 白</small></div>
            <div class="box">箱Ｃ<br><div id="c-r" class="ball red"></div><div id="c-k" class="ball black"></div><div id="c-w" class="ball white"></div><br><small>赤, 黒, 白</small></div>
        </div>

        <button onclick="draw()">玉を取り出す！</button>

        <div id="tree" class="tree-container">
            </div>
    </div>

    <script>
        const a_items = ['赤1', '赤2', '白'];
        const b_items = ['赤', '黒', '白'];
        const c_items = ['赤', '黒', '白'];
        const treeDiv = document.getElementById('tree');

        // 全パターンの生成
        let paths = [];
        for(let a of a_items) {
            for(let b of b_items) {
                for(let c of c_items) {
                    paths.push(`${a}-${b}-${c}`);
                }
            }
        }

        function initTree() {
            treeDiv.innerHTML = '';
            paths.forEach((p, index) => {
                const div = document.createElement('div');
                div.className = 'path';
                div.id = 'p-' + p;
                div.innerHTML = `${index + 1}: ${p.replace(/-/g, ' → ')}`;
                treeDiv.appendChild(div);
            });
        }
        initTree();

        function draw() {
            // リセット
            document.querySelectorAll('.ball').forEach(b => b.classList.remove('picked'));
            document.querySelectorAll('.path').forEach(p => p.classList.remove('highlight'));

            // 抽選
            const ra = a_items[Math.floor(Math.random() * 3)];
            const rb = b_items[Math.floor(Math.random() * 3)];
            const rc = c_items[Math.floor(Math.random() * 3)];

            // 箱の表示更新（グレーアウト）
            const idA = ra === '赤1' ? 'a-r1' : (ra === '赤2' ? 'a-r2' : 'a-w');
            const idB = rb === '赤' ? 'b-r' : (rb === '黒' ? 'b-k' : 'b-w');
            const idC = rc === '赤' ? 'c-r' : (rc === '黒' ? 'c-k' : 'c-w');
            document.getElementById(idA).classList.add('picked');
            document.getElementById(idB).classList.add('picked');
            document.getElementById(idC).classList.add('picked');

            // 樹形図のハイライト
            const pathId = `p-${ra}-${rb}-${rc}`;
            document.getElementById(pathId).classList.add('highlight');
            document.getElementById(pathId).scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>

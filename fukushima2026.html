<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>動的・図像的樹形図シミュレーター</title>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; margin: 0; padding: 20px; text-align: center; overflow-x: hidden; }
        .boxes { display: flex; justify-content: center; gap: 40px; margin-bottom: 20px; z-index: 10; position: relative; }
        .box { border: 2px solid #333; background: #fff; padding: 10px; border-radius: 8px; width: 150px; }
        .balls-container { display: flex; justify-content: space-around; margin-top: 10px; }
        .ball { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #999; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #333; font-weight: bold; background-color: #fff; position: relative; }
        .red { background-color: #ff4d4d; color: white; }
        .black { background-color: #333; color: white; }
        .white { background-color: #fff; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; z-index: 10; position: relative; }
        
        #tree-area { position: relative; width: 800px; height: 900px; margin: 0 auto; background: #fff; border: 1px solid #ddd; border-radius: 8px; margin-top: 20px; }
        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .node-placeholder { width: 30px; height: 30px; border-radius: 50%; border: 2px dashed #ccc; position: absolute; transform: translate(-50%, -50%); }
        
        /* アニメーション用の動的玉 */
        .moving-ball { position: absolute; z-index: 100; transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .line { stroke: #ddd; stroke-width: 2; transition: stroke 0.5s, stroke-width 0.5s; }
        .line.active { stroke: #ff9800; stroke-width: 4; }
    </style>
</head>
<body>

    <h2>図像的樹形図 アニメーション</h2>
    <div class="boxes">
        <div class="box" id="boxA">箱Ａ<br><div class="balls-container"><div class="ball red" id="src-A-0">赤1</div><div class="ball red" id="src-A-1">赤2</div><div class="ball white" id="src-A-2">白</div></div></div>
        <div class="box" id="boxB">箱Ｂ<br><div class="balls-container"><div class="ball red" id="src-B-0">赤</div><div class="ball black" id="src-B-1">黒</div><div class="ball white" id="src-B-2">白</div></div></div>
        <div class="box" id="boxC">箱Ｃ<br><div class="balls-container"><div class="ball red" id="src-C-0">赤</div><div class="ball black" id="src-C-1">黒</div><div class="ball white" id="src-C-2">白</div></div></div>
    </div>
    
    <button onclick="drawBalls()" id="drawBtn">玉を取り出す</button>
    <h3 id="result-text"></h3>

    <div id="tree-area">
        <svg id="tree-svg"></svg>
        <div id="nodes-container"></div>
    </div>

    <script>
        const a_items = [{c:'red', t:'赤1'}, {c:'red', t:'赤2'}, {c:'white', t:'白'}];
        const bc_items = [{c:'red', t:'赤'}, {c:'black', t:'黒'}, {c:'white', t:'白'}];
        
        const treeArea = document.getElementById('tree-area');
        const svg = document.getElementById('tree-svg');
        const nodesContainer = document.getElementById('nodes-container');
        
        const width = 800; const height = 900;
        const x_offsets = [100, 400, 700]; // A, B, C のX座標
        let nodesData = [[], [], []];
        let linesData = [];

        // 樹形図の座標計算と描画準備
        function initTree() {
            // Aのノード (3個)
            for(let i=0; i<3; i++) {
                nodesData[0].push({ x: x_offsets[0], y: height * (i+1)/4, item: a_items[i], parent: null, id: `nodeA-${i}` });
            }
            // Bのノード (9個)
            let b_idx = 0;
            for(let i=0; i<3; i++) {
                for(let j=0; j<3; j++) {
                    let y = height * (b_idx+1)/10;
                    nodesData[1].push({ x: x_offsets[1], y: y, item: bc_items[j], parent: nodesData[0][i], id: `nodeB-${b_idx}`, pIdx: i, localIdx: j });
                    linesData.push({ x1: x_offsets[0], y1: nodesData[0][i].y, x2: x_offsets[1], y2: y, id: `lineAB-${b_idx}` });
                    b_idx++;
                }
            }
            // Cのノード (27個)
            let c_idx = 0;
            for(let i=0; i<9; i++) {
                for(let j=0; j<3; j++) {
                    let y = height * (c_idx+1)/28;
                    nodesData[2].push({ x: x_offsets[2], y: y, item: bc_items[j], parent: nodesData[1][i], id: `nodeC-${c_idx}`, pIdx: i, localIdx: j });
                    linesData.push({ x1: x_offsets[1], y1: nodesData[1][i].y, x2: x_offsets[2], y2: y, id: `lineBC-${c_idx}` });
                    c_idx++;
                }
            }

            // SVGで線を引く
            linesData.forEach(line => {
                let l = document.createElementNS("http://www.w3.org/2000/svg", "line");
                l.setAttribute("x1", line.x1); l.setAttribute("y1", line.y1);
                l.setAttribute("x2", line.x2); l.setAttribute("y2", line.y2);
                l.setAttribute("class", "line");
                l.setAttribute("id", line.id);
                svg.appendChild(l);
            });

            // プレースホルダー（点線枠）を置く
            nodesData.flat().forEach(node => {
                let div = document.createElement('div');
                div.className = 'node-placeholder';
                div.style.left = node.x + 'px';
                div.style.top = node.y + 'px';
                nodesContainer.appendChild(div);
            });
        }
        initTree();

        let movingElements = [];

        function drawBalls() {
            document.getElementById('drawBtn').disabled = true;
            document.getElementById('result-text').innerText = "";
            
            // リセット
            movingElements.forEach(el => el.remove());
            movingElements = [];
            document.querySelectorAll('.line').forEach(l => l.classList.remove('active'));
            document.querySelectorAll('.ball').forEach(b => b.style.opacity = '1');

            // 抽選
            const a_choice = Math.floor(Math.random() * 3);
            const b_choice = Math.floor(Math.random() * 3);
            const c_choice = Math.floor(Math.random() * 3);

            // 該当するノードのインデックスを計算
            const targetA_idx = a_choice;
            const targetB_idx = targetA_idx * 3 + b_choice;
            const targetC_idx = targetB_idx * 3 + c_choice;

            const targets = [
                { srcId: `src-A-${a_choice}`, targetNode: nodesData[0][targetA_idx], item: a_items[a_choice] },
                { srcId: `src-B-${b_choice}`, targetNode: nodesData[1][targetB_idx], item: bc_items[b_choice] },
                { srcId: `src-C-${c_choice}`, targetNode: nodesData[2][targetC_idx], item: bc_items[c_choice] }
            ];

            const treeRect = treeArea.getBoundingClientRect();

            targets.forEach((t, index) => {
                // 箱の中の玉をグレーアウト
                const srcEl = document.getElementById(t.srcId);
                const srcRect = srcEl.getBoundingClientRect();
                srcEl.style.opacity = '0.2';

                // 移動用の玉を生成
                let mover = document.createElement('div');
                mover.className = `ball ${t.item.c} moving-ball`;
                mover.innerText = t.item.t;
                
                // 初期位置（画面全体に対する絶対座標）
                mover.style.left = srcRect.left + 'px';
                mover.style.top = srcRect.top + window.scrollY + 'px';
                document.body.appendChild(mover);
                movingElements.push(mover);

                // 少し遅延させてから樹形図上の座標へ移動
                setTimeout(() => {
                    mover.style.left = (treeRect.left + t.targetNode.x - 15) + 'px'; // 15は玉の半径
                    mover.style.top = (treeRect.top + window.scrollY + t.targetNode.y - 15) + 'px';
                }, 100);
            });

            // 線をハイライト
            setTimeout(() => {
                document.getElementById(`lineAB-${targetB_idx}`).classList.add('active');
                document.getElementById(`lineBC-${targetC_idx}`).classList.add('active');
                
                // 結果判定
                let colors = [targets[0].item.c, targets[1].item.c, targets[2].item.c];
                let isQ1 = (targets[0].item.c === 'red' && targets[1].item.c === 'black' && targets[2].item.c === 'white');
                let isQ2 = (new Set(colors).size <= 2);
                
                let resText = `結果: A=${targets[0].item.t}, B=${targets[1].item.t}, C=${targets[2].item.t}。`;
                if(isQ1) resText += " 【①の条件達成】";
                if(isQ2) resText += " 【②少なくとも2個同じ達成】";
                document.getElementById('result-text').innerText = resText;
                
                document.getElementById('drawBtn').disabled = false;
            }, 1600);
        }
    </script>
</body>
</html>
